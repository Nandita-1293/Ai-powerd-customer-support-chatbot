<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regestration Page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:"Poppins",sans-serif;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('img1.jpg') no-repeat;
            background-size: cover;
            background-position: center;
            background-color: #2E8B57;
        }
        .container{
            width: 420px;
            background:transparent;
            border: 2px solid rgba(255,255,255,.2);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 10px rgba(0,0,0,.2);
            color: #fff;
            border-radius: 10px;
            padding: 30px 40px;


        }
        .container h1{
            font-size: 36px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .container .input-box{
            display: flex;
            /* position: relative; */
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }
        .input-box input{
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            border: 2px solid rgba(255,255,255,.2);
            border-radius: 40px;
            color: #fff;
            padding: 20px 45px 20px 20px;
            font-size: 16px;

        }
        .input-box input::placeholder{
            font-size: 16px;
            
            color: #fff;
            margin-bottom: 5px;
           
        }

        .gender{

            display: flex;
            font-size: 18px;
        }
        .gender h3{
            font-size: 23px;
            font-weight: 500;
        }
        .gender input{
            margin-right: 7px;
            margin-left: 30px;
        }
        .gender label {
            margin-right: 10px;
            font-size: 20px;
            justify-content: space-between;
        }
        
        .container .btn{
            width: 100%;
            height: 45px;
            background: #fff;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 600;
            
        }
       
    </style>
</head>
<body >
    <div class="container">
        <form>
            <h1>Registration Page</h1>
            <div class="input-box">
                <input type="text" placeholder="Full Name" required> 
            </div>
            <div class="input-box">
                <input type="email" placeholder="Email" required> 
            </div>
            <div class="input-box">
                <input type="tel" placeholder="Mobile no" required> 
            </div>
            <div class="gender">
                    <h3>Gender</h3>
                    <input type="radio" name="r1" >
                    <label >Male</label>
                    <input type="radio" name="r1">
                    <label>Female</label>
                
                
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Conform Password" required>
            </div>
            
            <br>
            <button class="btn">Register</button>
    
           
        </form>
    </div>
</body>
</html>
