<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:"Poppins",sans-serif;
        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('img1.jpg') no-repeat;
            background-size: cover;
            background-position: center;
            background-color: #2E8B57;
        }
        .container{
            width: 420px;
            background:transparent;
            border: 2px solid rgba(255,255,255,.2);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 10px rgba(0,0,0,.2);
            color: #fff;
            border-radius: 10px;
            padding: 30px 40px;


        }
        .container h1{
            font-size: 36px;
            text-align: center;
            font-weight: bold;
        }
        .container .input-box{
            position: relative;
            width: 100%;
            height: 50px;
            margin: 30px 0;
        }
        .input-box input{
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            border: 2px solid rgba(255,255,255,.2);
            border-radius: 40px;
            color: #fff;
            padding: 20px 45px 20px 20px;
            font-size: 16px;

        }
        .input-box input::placeholder{
            color: #fff;
        }
        .container .rem-for{
            display: flex;
            justify-content: space-between;
            font-size: 14.5px;
            margin: -15px 0 10px;
            margin-top: 10px;
        }
        .rem-for label input{
            accent-color: #fff;
            margin-right: 3px;
        }
        .rem-for a{
            color: #fff;
            text-decoration: none;

        }
        .rem-for a:hover{
            text-decoration: underline;

        }
        .container .btn{
            width: 100%;
            height: 45px;
            background: #fff;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }
        .container .regester-link{
            font-size: 14.5px;
            text-align: center;
            margin: 20px 0 15px;

        }
        .regester-link p a{
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        .regester-link p a:hover{
            text-decoration: underline;
        }
    </style>
    
</head>
<body >
    
    <div class="container">
    <form >
       
        <h1>Login</h1>
        <div class="input-box">
            <input type="email" placeholder="email" required> 
        </div>
        <div class="input-box">
            <input type="password" placeholder="password" required>
        </div>
        <div class="rem-for">
            <label>
               <input type="checkbox" > Remember me
            </label>
            <a href="#">Forget Password</a>
        </div>
        <br>
        <button class="btn">Login</button>

        <div class="regester-link">
            <p>Don't have an account?
                <a href="register.html">Register</a>
            </p>
        </div>
    </form>

    </div>

    
</body>
</html>
